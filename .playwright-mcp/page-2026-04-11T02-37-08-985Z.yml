          - paragraph [ref=e86]: I'm a Kinesiology faculty member at Cal State San Marcos where I teach sections of the Internship Program, preparing students for their first professional roles in health and fitness.
          - paragraph [ref=e87]: My teaching focuses on practical career skills—LinkedIn optimization, resume building, certification planning, and interview preparation. When my students walk into an interview, they're ready.
          - paragraph [ref=e88]: Outside the classroom, I build tools and resources at the intersection of technology and human performance. I'm developing TechniqueAI, a video analysis app for coaches and athletes in throwing events. I've also created AI-powered training program generators based on Dr. Anatoliy Bondarchuk's Transfer of Training methodology, helping coaches design periodized programs for throws athletes.
          - paragraph [ref=e89]: Technology should amplify what we do, not replace the human connection at the heart of helping others move and perform better.
